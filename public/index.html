<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColleagueLocal</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="page-title">ColleagueLocal</div>
    
    <h1>Upload a File</h1>
    <form id="uploadForm">
      <input type="file" name="file" id="fileInput" required>
      <button type="submit">Upload</button>
    </form>
    <div id="progressContainer" style="display: none;">
      <div style="background: #ddd; border-radius: 4px; overflow: hidden; height: 20px;">
        <div id="progressBar" style="background: #28a745; height: 100%; width: 0%; transition: width 0.3s;"></div>
      </div>
      <span id="progressText">0%</span>
    </div>
    <div id="successMessage"></div>

    <h2>Available Files</h2>
    <div class="content-wrapper">
      <div class="file-list-container">
        <div id="fileList"></div>
      </div>
      <div id="previewContainer" class="preview-container" style="display: none;">
        <div id="previewContent" class="preview-content"></div>
        <div class="preview-header">
          <button id="backButton" class="back-button">← Back</button>
          <button id="downloadButton" class="download-button">Download</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
